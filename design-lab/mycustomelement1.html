<body>
    <modalete-ui data-modalete></modalete-ui>
    <button id="btn-test">Mostrar modal personalizado</button>
    <script type="module">
        import './mycustomelement1.ts';
        const modal = document.querySelector('[data-modalete]');
        const btn = document.getElementById('btn-test');
        btn.addEventListener('click', async () => {
            const resultado = await modal.confirmandias({
                title: '¿Deseas eliminar este elemento?',
                message: 'Esta acción no se puede deshacer.',
                confirmText: 'Sí, eliminar',
                cancelText: 'Cancelar'
            });
            console.log('El hobbit eligió:', resultado);
        });

    </script>
</body>
