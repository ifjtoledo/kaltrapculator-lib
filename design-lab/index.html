<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Lab — powered by &lt;kaltrap-culator&gt;</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./lab.css" />
</head>

<body>
    <main class="lab">
        <nav class="lab__tabs" role="tablist" aria-label="Modo de calculadora">
            <button class="lab__tab lab__tab--active" role="tab" id="tab-full" aria-selected="true"
                aria-controls="panel-full">Completo</button>
            <button class="lab__tab" role="tab" id="tab-basic" aria-selected="false"
                aria-controls="panel-basic">Básico</button>
        </nav>

        <!-- ─── Panel: modo completo (operaciones matemáticas) ─── -->
        <section class="lab__panel" id="panel-full" role="tabpanel" aria-labelledby="tab-full">
            <section class="lab__host-field" aria-label="Campo host">
                <label class="lab__host-label">Precio (currency)</label>
                <input class="lab__host-input" id="price-host" name="price" type="text" inputmode="decimal"
                    autocomplete="off" placeholder="$ 0" aria-label="Monto monetario" aria-expanded="false" readonly
                    data-kaltrap data-kaltrap-currency="$" data-kaltrap-decimals="2" data-kaltrap-locale="es-CO"
                    data-kaltrap-allow-negative="false" data-kaltrap-calc="full" />
            </section>

            <section class="lab__host-field" aria-label="Campo numerico puro">
                <label class="lab__host-label">Cantidad (numeric)</label>
                <input class="lab__host-input" id="quantity-host" name="quantity" type="number" step="0.01"
                    autocomplete="off" placeholder="0" aria-label="Cantidad numerica" aria-expanded="false" readonly
                    data-kaltrap data-kaltrap-mode="numeric" data-kaltrap-decimals="2" data-kaltrap-locale="es-CO"
                    data-kaltrap-allow-negative="false" data-kaltrap-calc="full" />
            </section>

            <section class="lab__host-field" aria-label="Campo numerico estricto entero">
                <label class="lab__host-label">Unidades (numeric-strict)</label>
                <input class="lab__host-input" id="units-host" name="units" type="number" step="1" autocomplete="off"
                    placeholder="0" aria-label="Unidades enteras" aria-expanded="false" readonly data-kaltrap
                    data-kaltrap-mode="numeric-strict" data-kaltrap-decimals="0" data-kaltrap-locale="es-CO"
                    data-kaltrap-allow-negative="false" data-kaltrap-calc="full" />
            </section>
        </section>

        <!-- ─── Panel: modo básico (solo asistencia de formato) ─── -->
        <section class="lab__panel lab__panel--hidden" id="panel-basic" role="tabpanel" aria-labelledby="tab-basic"
            hidden>
            <section class="lab__host-field" aria-label="Campo host basico">
                <label class="lab__host-label">Precio (currency)</label>
                <input class="lab__host-input" id="price-host-basic" name="price_basic" type="text" inputmode="decimal"
                    autocomplete="off" placeholder="$ 0" aria-label="Monto monetario basico" aria-expanded="false"
                    readonly data-kaltrap data-kaltrap-currency="$" data-kaltrap-decimals="2"
                    data-kaltrap-locale="es-CO" data-kaltrap-allow-negative="false" data-kaltrap-calc="basic" />
            </section>

            <section class="lab__host-field" aria-label="Campo numerico basico">
                <label class="lab__host-label">Cantidad (numeric)</label>
                <input class="lab__host-input" id="quantity-host-basic" name="quantity_basic" type="number" step="0.01"
                    autocomplete="off" placeholder="0" aria-label="Cantidad numerica basica" aria-expanded="false"
                    readonly data-kaltrap data-kaltrap-mode="numeric" data-kaltrap-decimals="2"
                    data-kaltrap-locale="es-CO" data-kaltrap-allow-negative="false" data-kaltrap-calc="basic" />
            </section>

            <section class="lab__host-field" aria-label="Campo numerico estricto basico">
                <label class="lab__host-label">Unidades (numeric-strict)</label>
                <input class="lab__host-input" id="units-host-basic" name="units_basic" type="number" step="1"
                    autocomplete="off" placeholder="0" aria-label="Unidades enteras basicas" aria-expanded="false"
                    readonly data-kaltrap data-kaltrap-mode="numeric-strict" data-kaltrap-decimals="0"
                    data-kaltrap-locale="es-CO" data-kaltrap-allow-negative="false" data-kaltrap-calc="basic" />
            </section>
        </section>
    </main>

    <kaltrap-culator></kaltrap-culator>

    <script type="module" src="./lab.ts"></script>
</body>

</html>
