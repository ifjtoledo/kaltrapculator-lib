<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaltrap Design Lab</title>
    <link rel="stylesheet" href="./lab.css" />
</head>

<body>
    <main class="lab-page">
        <header class="lab-header">
            <h1>Kaltrap Design Lab</h1>
            <p>Experimenta aqui solo con HTML y CSS. No hay logica ni TypeScript.</p>
        </header>

        <section class="stage" aria-label="Escenario de diseno">
            <article class="claptrap-body" role="img" aria-label="Calculadora estilo Claptrap">
                <div class="eye-indicator"></div>
                <div class="screen">0</div>

                <div class="grid">
                    <button>7</button><button>8</button><button>9</button><button class="btn-op">/</button>
                    <button>4</button><button>5</button><button>6</button><button class="btn-op">*</button>
                    <button>1</button><button>2</button><button>3</button><button class="btn-op">-</button>
                    <button>0</button><button>.</button><button class="btn-equal">=</button>
                </div>
            </article>
        </section>
    </main>
</body>

</html>
