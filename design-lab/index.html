<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Lab</title>
    <link rel="stylesheet" href="./lab.css" />
</head>

<body>
    <main class="lab-root">
        <section class="host-field-preview" aria-label="Campo host">
            <label for="price-host">Monto</label>
            <input id="price-host" name="price" type="text" inputmode="decimal" autocomplete="off" placeholder="$ 0"
                data-claptrap data-claptrap-currency="$" data-claptrap-decimals="2" data-claptrap-locale="es-CO"
                data-claptrap-allow-negative="false" />
        </section>

        <section class="widget-shell" role="dialog" aria-modal="false" aria-label="Claptrap widget" hidden>
            <header class="widget-header">
                <h1>Claptrap Widget</h1>
                <p>Ingreso monetario asistido por teclado</p>
            </header>

            <section class="widget-timeline" aria-label="Niveles confirmados">
                <ol class="timeline-list">
                    <li class="timeline-item">
                        <span class="timeline-value">$ 1.000.000</span>
                        <span class="timeline-op">%</span>
                    </li>
                </ol>
            </section>

            <section class="widget-active-level" aria-label="Nivel activo">
                <label for="widget-draft">Valor actual</label>
                <input id="widget-draft" class="draft-input" type="text" inputmode="decimal" autocomplete="off"
                    placeholder="$ 0" />
            </section>

            <section class="widget-operator-picker" aria-label="Seleccion de operador">
                <ul class="operator-list" role="listbox" aria-label="Operadores">
                    <li class="operator-item is-active" aria-selected="true" data-op="%">%</li>
                    <li class="operator-item" aria-selected="false" data-op="+">+</li>
                    <li class="operator-item" aria-selected="false" data-op="-">-</li>
                    <li class="operator-item" aria-selected="false" data-op="*">*</li>
                    <li class="operator-item" aria-selected="false" data-op="/">/</li>
                </ul>
            </section>

            <section class="widget-preview" aria-live="polite" aria-label="Resultado provisional">
                <p class="preview-label">Preview</p>
                <output class="preview-value">$ 600.000</output>
            </section>

            <section class="widget-hints" aria-label="Guia de teclado">
                <p>↓ nuevo nivel</p>
                <p>← → operador</p>
                <p>Enter confirmar</p>
                <p>Esc cancelar</p>
            </section>

            <footer class="widget-actions">
                <button type="button" data-action="cancel">Cancelar</button>
                <button type="button" data-action="apply">Aplicar</button>
            </footer>
        </section>
    </main>
</body>

</html>
