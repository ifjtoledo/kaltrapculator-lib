<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./lab.css" />
</head>

<body>
    <main class="lab">
        <nav class="lab__tabs" role="tablist" aria-label="Modo de calculadora">
            <button class="lab__tab lab__tab--active" role="tab" id="tab-full" aria-selected="true"
                aria-controls="panel-full">Completo</button>
            <button class="lab__tab" role="tab" id="tab-basic" aria-selected="false"
                aria-controls="panel-basic">Básico</button>
        </nav>

        <!-- ─── Panel: modo completo (operaciones matemáticas) ─── -->
        <section class="lab__panel" id="panel-full" role="tabpanel" aria-labelledby="tab-full">
            <section class="lab__host-field" aria-label="Campo host">
                <label class="lab__host-label">Precio (currency)</label>
                <input class="lab__host-input" id="price-host" name="price" type="text" inputmode="decimal"
                    autocomplete="off" placeholder="$ 0" aria-label="Monto monetario" aria-haspopup="dialog"
                    aria-controls="claptrap-widget" aria-expanded="false" readonly data-claptrap
                    data-claptrap-currency="$" data-claptrap-decimals="2" data-claptrap-locale="es-CO"
                    data-claptrap-allow-negative="false" data-claptrap-calc="full" />
            </section>

            <section class="lab__host-field" aria-label="Campo numerico puro">
                <label class="lab__host-label">Cantidad (numeric)</label>
                <input class="lab__host-input" id="quantity-host" name="quantity" type="number" step="0.01"
                    autocomplete="off" placeholder="0" aria-label="Cantidad numerica" aria-haspopup="dialog"
                    aria-controls="claptrap-widget" aria-expanded="false" readonly data-claptrap
                    data-claptrap-mode="numeric" data-claptrap-decimals="2" data-claptrap-locale="es-CO"
                    data-claptrap-allow-negative="false" data-claptrap-calc="full" />
            </section>

            <section class="lab__host-field" aria-label="Campo numerico estricto entero">
                <label class="lab__host-label">Unidades (numeric-strict)</label>
                <input class="lab__host-input" id="units-host" name="units" type="number" step="1" autocomplete="off"
                    placeholder="0" aria-label="Unidades enteras" aria-haspopup="dialog" aria-controls="claptrap-widget"
                    aria-expanded="false" readonly data-claptrap data-claptrap-mode="numeric-strict"
                    data-claptrap-decimals="0" data-claptrap-locale="es-CO" data-claptrap-allow-negative="false"
                    data-claptrap-calc="full" />
            </section>
        </section>

        <!-- ─── Panel: modo básico (solo asistencia de formato) ─── -->
        <section class="lab__panel lab__panel--hidden" id="panel-basic" role="tabpanel" aria-labelledby="tab-basic"
            hidden>
            <section class="lab__host-field" aria-label="Campo host basico">
                <label class="lab__host-label">Precio (currency)</label>
                <input class="lab__host-input" id="price-host-basic" name="price_basic" type="text" inputmode="decimal"
                    autocomplete="off" placeholder="$ 0" aria-label="Monto monetario basico" aria-haspopup="dialog"
                    aria-controls="claptrap-widget" aria-expanded="false" readonly data-claptrap
                    data-claptrap-currency="$" data-claptrap-decimals="2" data-claptrap-locale="es-CO"
                    data-claptrap-allow-negative="false" data-claptrap-calc="basic" />
            </section>

            <section class="lab__host-field" aria-label="Campo numerico basico">
                <label class="lab__host-label">Cantidad (numeric)</label>
                <input class="lab__host-input" id="quantity-host-basic" name="quantity_basic" type="number" step="0.01"
                    autocomplete="off" placeholder="0" aria-label="Cantidad numerica basica" aria-haspopup="dialog"
                    aria-controls="claptrap-widget" aria-expanded="false" readonly data-claptrap
                    data-claptrap-mode="numeric" data-claptrap-decimals="2" data-claptrap-locale="es-CO"
                    data-claptrap-allow-negative="false" data-claptrap-calc="basic" />
            </section>

            <section class="lab__host-field" aria-label="Campo numerico estricto basico">
                <label class="lab__host-label">Unidades (numeric-strict)</label>
                <input class="lab__host-input" id="units-host-basic" name="units_basic" type="number" step="1"
                    autocomplete="off" placeholder="0" aria-label="Unidades enteras basicas" aria-haspopup="dialog"
                    aria-controls="claptrap-widget" aria-expanded="false" readonly data-claptrap
                    data-claptrap-mode="numeric-strict" data-claptrap-decimals="0" data-claptrap-locale="es-CO"
                    data-claptrap-allow-negative="false" data-claptrap-calc="basic" />
            </section>
        </section>

        <section id="claptrap-widget" class="widget" role="dialog" aria-modal="true" aria-label="Claptrap widget"
            hidden>
            <section class="widget__timeline" aria-label="Niveles confirmados">
                <ol class="widget__timeline-list"></ol>
            </section>

            <section class="widget__active-level" aria-label="Nivel activo">
                <input id="widget-draft" class="widget__draft-input" type="text" inputmode="decimal" autocomplete="off"
                    aria-label="Valor activo" placeholder="$ 0" />
            </section>

            <section class="widget__operator-picker" aria-label="Seleccion de operador">
                <ul class="widget__operator-list" role="listbox" aria-label="Operadores">
                    <li class="widget__operator-item widget__operator-item--active" aria-selected="true" data-op="+">+
                    </li>
                    <li class="widget__operator-item" aria-selected="false" data-op="-">-</li>
                    <li class="widget__operator-item" aria-selected="false" data-op="*">*</li>
                    <li class="widget__operator-item" aria-selected="false" data-op="/">/</li>
                    <li class="widget__operator-item" aria-selected="false" data-op="%">%</li>
                </ul>
            </section>

            <section class="widget__preview" aria-live="polite" aria-label="Resultado provisional">
                <output class="widget__preview-value">$ 0</output>
            </section>

            <footer class="widget__actions">
                <button type="button" data-action="cancel" aria-label="Cancelar" title="Cancelar">x</button>
                <button type="button" data-action="apply" aria-label="Aplicar" title="Aplicar">ok</button>
            </footer>
        </section>
    </main>
    <script type="module" src="./lab.ts"></script>
</body>

</html>
