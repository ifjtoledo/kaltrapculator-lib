<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <title>Kaltrapculator Demo</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Open Sans", sans-serif;
            background: #121212;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            gap: 24px;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0;
        }

        .field {
            display: grid;
            gap: 4px;
            width: min(360px, 92vw);
        }

        .field label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #8a8a8a;
        }

        .field input {
            width: 100%;
            min-height: 46px;
            padding: 0 12px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1.25rem;
            font-weight: 700;
            background: #181818;
            color: #f0f0f0;
            box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.45), inset 0 0 0 1px rgba(0, 0, 0, 0.18);
        }

        .field input:focus-visible {
            outline: 2px solid #4d9fe1;
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <h1>Kaltrapculator Demo</h1>

    <div class="field">
        <label>Precio (currency — full mode)</label>
        <input type="text" inputmode="decimal" autocomplete="off" placeholder="$ 0" readonly data-kaltrap
            data-kaltrap-currency="$" data-kaltrap-decimals="2" data-kaltrap-locale="es-CO" data-kaltrap-calc="full" />
    </div>

    <div class="field">
        <label>Cantidad (numeric — full mode)</label>
        <input type="number" step="0.01" autocomplete="off" placeholder="0" readonly data-kaltrap
            data-kaltrap-mode="numeric" data-kaltrap-decimals="2" data-kaltrap-locale="es-CO"
            data-kaltrap-calc="full" />
    </div>

    <div class="field">
        <label>Unidades (numeric-strict — basic mode)</label>
        <input type="number" step="1" autocomplete="off" placeholder="0" readonly data-kaltrap
            data-kaltrap-mode="numeric-strict" data-kaltrap-decimals="0" data-kaltrap-locale="es-CO"
            data-kaltrap-calc="basic" />
    </div>

    <kaltrap-culator></kaltrap-culator>

    <script type="module" src="/src/demo/main.ts"></script>
</body>

</html>
